version: '3.8'

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: monitor-estudos-test-db
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass123
      POSTGRES_DB: monitor_estudos_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d monitor_estudos_test"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_test_data:
